name: guardian-of-the-plants

services:
  nginx:
    image: nginx:stable-alpine
    container_name: guardian-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ./server
    container_name: guardian-server
    environment:
      SERVER_PORT: 8080
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-guardian_plants}
      POSTGRES_USER: ${POSTGRES_USER:-guardian_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_password}
      AI_BASE_URL: ${AI_BASE_URL:-https://ollama.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemma4:31b-cloud}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: guardian-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guardian_plants}
      POSTGRES_USER: ${POSTGRES_USER:-guardian_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: guardian-voicevox
    profiles:
      - voice
    restart: unless-stopped

volumes:
  postgres_data:
