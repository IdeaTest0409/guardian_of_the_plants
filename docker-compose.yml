name: guardian-of-the-plants

services:
  nginx:
    image: nginx:stable-alpine
    container_name: guardian-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: guardian-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guardian_plants}
      POSTGRES_USER: ${POSTGRES_USER:-guardian_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: guardian-voicevox
    profiles:
      - voice
    ports:
      - "${VOICEVOX_PORT:-50021}:50021"
    restart: unless-stopped

volumes:
  postgres_data:
