name: guardian-of-the-plants

services:
  nginx:
    image: nginx:stable-alpine
    container_name: guardian-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend
      - backend

  server:
    build:
      context: ./server
    container_name: guardian-server
    environment:
      SERVER_PORT: 8080
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-guardian_plants}
      POSTGRES_USER: ${POSTGRES_USER:-guardian_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_password}
      AI_BASE_URL: ${AI_BASE_URL:-https://ollama.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemma4:31b-cloud}
      VOICEVOX_ENABLED: ${VOICEVOX_ENABLED:-false}
      VOICEVOX_BASE_URL: ${VOICEVOX_BASE_URL:-http://voicevox:50021}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_APP_START_PER_MINUTE: ${RATE_LIMIT_APP_START_PER_MINUTE:-30}
      RATE_LIMIT_CHAT_PER_MINUTE: ${RATE_LIMIT_CHAT_PER_MINUTE:-20}
      RATE_LIMIT_TTS_PER_MINUTE: ${RATE_LIMIT_TTS_PER_MINUTE:-30}
      RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
      RETENTION_APP_LOGS_DAYS: ${RETENTION_APP_LOGS_DAYS:-30}
      RETENTION_CHAT_HISTORY_DAYS: ${RETENTION_CHAT_HISTORY_DAYS:-90}
      RETENTION_PRUNE_ON_APP_START_EVERY: ${RETENTION_PRUNE_ON_APP_START_EVERY:-100}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  db:
    image: postgres:16-alpine
    container_name: guardian-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guardian_plants}
      POSTGRES_USER: ${POSTGRES_USER:-guardian_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: guardian-voicevox
    environment:
      - VV_VOLUME=/tmp/voicevox
    volumes:
      - voicevox_data:/tmp/voicevox
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:50021/version >/dev/null 2>&1 || curl -fsS http://localhost:50021/version >/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  voicevox_data:

networks:
  frontend:
  backend:
