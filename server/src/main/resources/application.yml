server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: guardian-plants-server
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:guardian_plants}
    username: ${POSTGRES_USER:guardian_user}
    password: ${POSTGRES_PASSWORD:guardian_password}
    driver-class-name: org.postgresql.Driver
