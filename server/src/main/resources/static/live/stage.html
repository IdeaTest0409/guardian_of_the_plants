<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Guardian Live Stage</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1110;
      color: #f7fbf8;
      font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    }
    body { display: grid; place-items: center; }
    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: linear-gradient(135deg, #14201c 0%, #0b1110 100%);
    }
    @media (min-aspect-ratio: 16/9) {
      .frame { width: calc(100vh * 16 / 9); height: 100vh; }
    }
    @media (max-aspect-ratio: 16/9) {
      .frame { width: 100vw; height: calc(100vw * 9 / 16); }
    }
    .plant-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 22% 24%, rgba(98, 148, 119, 0.22), transparent 34%),
        linear-gradient(135deg, #14201c 0%, #0b1110 100%);
    }
    .plant-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: saturate(1.05) contrast(1.02);
    }
    .plant-placeholder {
      color: #a8bdb2;
      font-size: clamp(26px, 3vw, 52px);
      font-weight: 700;
    }
    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(4, 8, 7, 0.52), transparent 18%, transparent 58%, rgba(4, 8, 7, 0.72)),
        linear-gradient(90deg, transparent 0%, transparent 52%, rgba(5, 9, 8, 0.74) 100%);
      pointer-events: none;
    }
    .guardian-area {
      position: absolute;
      right: 4.4%;
      top: 7%;
      width: 27%;
      height: 61%;
      display: grid;
      grid-template-rows: 1fr auto auto;
      justify-items: center;
      align-items: end;
    }
    #guardian-canvas {
      width: min(100%, 390px);
      height: min(100%, 510px);
      min-height: 360px;
      display: block;
    }
    .guardian-fallback {
      display: none;
      width: min(100%, 320px);
      aspect-ratio: 0.82;
      border-radius: 8px;
      background: linear-gradient(180deg, #f0d489, #c99636);
      place-items: center;
      color: #3d2a10;
      font-size: clamp(52px, 6vw, 110px);
      font-weight: 800;
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.46);
    }
    .guardian-name {
      margin-top: 2px;
      font-size: clamp(22px, 2.2vw, 38px);
      font-weight: 800;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.55);
    }
    .status {
      margin-top: 7px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(16, 28, 24, 0.74);
      color: #9ee7d0;
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 700;
      text-transform: uppercase;
    }
    .loading {
      position: absolute;
      right: 5%;
      top: 68%;
      color: #e9f4ee;
      font-size: clamp(12px, 1vw, 16px);
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    .audio-button {
      position: absolute;
      right: 4.5%;
      top: 4.2%;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 8px;
      background: rgba(9, 16, 14, 0.72);
      color: #f7fbf8;
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 700;
      cursor: pointer;
    }
    .audio-button.enabled {
      color: #112018;
      background: #9ee7d0;
    }
    .user-text {
      position: absolute;
      left: 4.5%;
      top: 5.2%;
      max-width: 48%;
      padding: 12px 18px;
      border-radius: 8px;
      background: rgba(7, 13, 11, 0.66);
      border: 1px solid rgba(178, 225, 202, 0.22);
      color: #dceee5;
      font-size: clamp(18px, 1.45vw, 28px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .caption {
      position: absolute;
      left: 4.5%;
      right: 4.5%;
      bottom: 5.2%;
      height: 24%;
      padding: 22px 30px;
      border-radius: 8px;
      background: rgba(5, 9, 8, 0.86);
      border: 1px solid rgba(181, 231, 207, 0.32);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
      display: flex;
      align-items: center;
      color: #fbfff9;
      font-size: clamp(28px, 2.35vw, 46px);
      font-weight: 800;
      line-height: 1.32;
      overflow: hidden;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.62);
    }
    .error { color: #ffb5b5; }
  </style>
</head>
<body>
  <main class="frame">
    <section class="plant-layer">
      <img id="plant-image" class="plant-image" alt="植物画像" style="display:none;">
      <div id="plant-placeholder" class="plant-placeholder">植物画像を待っています</div>
    </section>
    <div class="shade"></div>
    <button id="audio-toggle" class="audio-button" type="button">Enable Audio</button>
    <aside class="guardian-area">
      <canvas id="guardian-canvas"></canvas>
      <div id="guardian-fallback" class="guardian-fallback">天</div>
      <div class="guardian-name">守護天使</div>
      <div id="status" class="status">idle</div>
    </aside>
    <div id="model-loading" class="loading">angel_egna.glb loading...</div>
    <div id="user-text" class="user-text">スマホまたはPCからのメッセージ待ち</div>
    <div id="caption" class="caption">話しかけると、ここに守護天使の返答が表示されます。</div>
    <audio id="live-audio" preload="auto"></audio>
  </main>
  <script type="module">
    let lastUpdatedAt = null;
    let lastAudioUrl = null;
    let audioEnabled = false;
    let currentStatus = 'idle';
    let guardianModel = null;
    let mouthTargets = [];
    let mixer = null;
    let clock = null;
    let audioContext = null;
    let audioAnalyser = null;
    let audioSamples = null;
    let smoothedMouth = 0;
    let modelInfoLogged = false;
    let THREE_NS = null;
    let liveSettings = { posePreset: 'auto' };
    let currentPosePreset = 'auto';
    let boneBaseRotations = [];

    const audio = document.getElementById('live-audio');
    const audioToggle = document.getElementById('audio-toggle');
    audioToggle.addEventListener('click', () => {
      audioEnabled = true;
      audioToggle.classList.add('enabled');
      audioToggle.textContent = 'Audio Enabled';
      setupAudioAnalysis();
      audio.play().catch(() => {});
    });

    function textOrFallback(value, fallback) {
      return value && String(value).trim() ? String(value) : fallback;
    }

    function playAudio(url) {
      if (!audioEnabled || !url || url === lastAudioUrl) return;
      lastAudioUrl = url;
      audio.src = url + '?t=' + Date.now();
      setupAudioAnalysis();
      audio.play().catch(() => {});
    }

    function render(state) {
      if (!state || state.updatedAt === lastUpdatedAt) return;
      lastUpdatedAt = state.updatedAt;
      currentStatus = textOrFallback(state.status, 'idle');

      const image = document.getElementById('plant-image');
      const placeholder = document.getElementById('plant-placeholder');
      if (state.plantImageDataUrl) {
        image.src = state.plantImageDataUrl;
        image.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        image.removeAttribute('src');
        image.style.display = 'none';
        placeholder.style.display = 'block';
      }

      document.getElementById('status').textContent = currentStatus;
      document.getElementById('user-text').textContent = textOrFallback(state.userText, 'スマホまたはPCからのメッセージ待ち');

      const caption = document.getElementById('caption');
      if (state.error) {
        caption.classList.add('error');
        caption.textContent = 'エラー: ' + state.error;
      } else {
        caption.classList.remove('error');
        caption.textContent = textOrFallback(
          state.assistantText,
          currentStatus === 'thinking' ? '守護天使が考えています。' : '話しかけると、ここに守護天使の返答が表示されます。'
        );
      }
      playAudio(state.audioUrl);
    }

    function loadState() {
      fetch('/api/live/state', { cache: 'no-store' })
        .then(r => r.json())
        .then(render)
        .catch(() => {
          currentStatus = 'offline';
          document.getElementById('status').textContent = 'offline';
        });
    }

    function loadSettings() {
      fetch('/api/live/settings', { cache: 'no-store' })
        .then(r => r.json())
        .then(settings => {
          const previousPreset = liveSettings.posePreset;
          liveSettings = {
            posePreset: settings.posePreset || 'auto'
          };
          if (liveSettings.posePreset !== previousPreset) applyPosePreset();
        })
        .catch(() => {});
    }

    function errorDetails(error, extra = {}) {
      return {
        errorName: error?.name || '',
        errorMessage: error?.message || String(error || ''),
        errorStack: error?.stack ? String(error.stack).slice(0, 1200) : '',
        userAgent: navigator.userAgent,
        url: location.href,
        ...extra
      };
    }

    function logClientError(message, error, extra = {}) {
      fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          deviceId: 'browser-live-stage',
          appVersion: 'web',
          severity: 'ERROR',
          category: 'LiveStage3D',
          message,
          details: errorDetails(error, extra)
        })
      }).catch(() => {});
    }

    function logClientInfo(message, details = {}) {
      fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          deviceId: 'browser-live-stage',
          appVersion: 'web',
          severity: 'INFO',
          category: 'LiveStage3D',
          message,
          details: {
            userAgent: navigator.userAgent,
            url: location.href,
            ...details
          }
        })
      }).catch(() => {});
    }

    function setupAudioAnalysis() {
      if (audioAnalyser) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        audioContext = audioContext || new AudioContextClass();
        const source = audioContext.createMediaElementSource(audio);
        audioAnalyser = audioContext.createAnalyser();
        audioAnalyser.fftSize = 1024;
        audioSamples = new Uint8Array(audioAnalyser.fftSize);
        source.connect(audioAnalyser);
        audioAnalyser.connect(audioContext.destination);
      } catch (e) {
        logClientError('Audio analyser setup failed', e);
      }
    }

    function currentAudioMouthValue() {
      if (!audioAnalyser || audio.paused || audio.ended) return 0;
      audioAnalyser.getByteTimeDomainData(audioSamples);
      let sum = 0;
      for (let i = 0; i < audioSamples.length; i++) {
        const centered = (audioSamples[i] - 128) / 128;
        sum += centered * centered;
      }
      const rms = Math.sqrt(sum / audioSamples.length);
      const target = Math.min(1, Math.max(0, (rms - 0.015) * 8.5));
      smoothedMouth = smoothedMouth * 0.72 + target * 0.28;
      return smoothedMouth;
    }

    function inspectModel(gltf, model) {
      const boneNames = [];
      const morphNames = [];
      model.traverse((node) => {
        if (node.isBone && boneNames.length < 80) boneNames.push(node.name);
        if (node.morphTargetDictionary) {
          Object.keys(node.morphTargetDictionary).forEach((name) => {
            if (morphNames.length < 80 && !morphNames.includes(name)) morphNames.push(name);
          });
        }
      });
      if (!modelInfoLogged) {
        modelInfoLogged = true;
        logClientInfo('angel_egna.glb inspected', {
          animations: gltf.animations.map((clip) => clip.name),
          boneNames,
          morphNames,
          mouthTargetCount: mouthTargets.length
        });
      }
    }

    function normalizeModelToGround(model) {
      const box = new THREE_NS.Box3().setFromObject(model);
      const center = box.getCenter(new THREE_NS.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;
    }

    function captureBasePose(model) {
      boneBaseRotations = [];
      model.traverse((node) => {
        if (node.isBone) {
          boneBaseRotations.push({ node, rotation: node.rotation.clone() });
        }
      });
    }

    function resetBasePose() {
      boneBaseRotations.forEach(({ node, rotation }) => {
        node.rotation.copy(rotation);
      });
    }

    function applyRestPose(model, strength = 1) {
      resetBasePose();
      model.traverse((node) => {
        if (!node.isBone || !node.name) return;
        const name = node.name.toLowerCase();
        const left = name.includes('left') || name.includes('_l') || name.endsWith('.l');
        const right = name.includes('right') || name.includes('_r') || name.endsWith('.r');
        if (!(left || right)) return;
        if (name.includes('upperarm') || name.includes('upper_arm') || name.includes('shoulder')) {
          node.rotation.z += (left ? 0.82 : -0.82) * strength;
          node.rotation.x += 0.08 * strength;
        }
        if (name.includes('lowerarm') || name.includes('forearm')) {
          node.rotation.z += (left ? 0.18 : -0.18) * strength;
        }
      });
    }

    function poseConfig() {
      switch (liveSettings.posePreset || 'auto') {
        case 'relaxed':
          return { scale: 1.38, y: -1.05, useMixer: true, restStrength: 0.55, sway: 0.65 };
        case 'arms-down':
          return { scale: 1.38, y: -1.05, useMixer: false, restStrength: 1.15, sway: 0.45 };
        case 'raw':
          return { scale: 1.38, y: -1.05, useMixer: true, restStrength: 0, sway: 0.5 };
        case 'small':
          return { scale: 1.18, y: -1.0, useMixer: true, restStrength: 0.55, sway: 0.55 };
        case 'large':
          return { scale: 1.55, y: -1.12, useMixer: true, restStrength: 0.55, sway: 0.55 };
        case 'auto':
        default:
          return { scale: 1.38, y: -1.05, useMixer: true, restStrength: 0.55, sway: 0.65 };
      }
    }

    function applyPosePreset() {
      const nextPreset = liveSettings.posePreset || 'auto';
      const config = poseConfig();
      if (guardianModel) {
        resetBasePose();
        if (config.restStrength > 0) applyRestPose(guardianModel, config.restStrength);
      }
      if (guardianModel) guardianModel.scale.setScalar(config.scale);
      if (mixer) mixer.timeScale = config.useMixer ? 1 : 0;
      currentPosePreset = nextPreset;
    }

    async function startGuardian3d() {
      try {
        const THREE = await import('https://esm.sh/three@0.164.1');
        THREE_NS = THREE;
        const { GLTFLoader } = await import('https://esm.sh/three@0.164.1/examples/jsm/loaders/GLTFLoader.js');
        const canvas = document.getElementById('guardian-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        const scene = new THREE.Scene();
        clock = new THREE.Clock();
        const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
        camera.position.set(0, 1.15, 3.5);

        const key = new THREE.DirectionalLight(0xfff1ba, 2.7);
        key.position.set(2.2, 3.2, 4.5);
        scene.add(key);
        scene.add(new THREE.AmbientLight(0xd8f4e6, 1.55));

        const root = new THREE.Group();
        root.position.set(0, -0.95, 0);
        root.rotation.y = Math.PI;
        scene.add(root);

        function resize() {
          const rect = canvas.getBoundingClientRect();
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.setSize(rect.width, rect.height, false);
          camera.aspect = rect.width / rect.height;
          camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        const loader = new GLTFLoader();
        loader.load(
          '/live/assets/models/angel_egna.glb',
          (gltf) => {
            guardianModel = gltf.scene;
            guardianModel.scale.setScalar(poseConfig().scale);
            guardianModel.position.set(0, 0, 0);
            mouthTargets = [];
            guardianModel.traverse((node) => {
              if (node.isMesh) {
                node.frustumCulled = false;
                if (node.morphTargetDictionary && node.morphTargetInfluences) {
                  Object.entries(node.morphTargetDictionary).forEach(([name, index]) => {
                    const normalized = name.toLowerCase();
                    if (
                      normalized.includes('mth') ||
                      normalized.includes('mouth') ||
                      normalized.includes('jaw') ||
                      normalized.includes('aa') ||
                      normalized.includes('ih') ||
                      normalized.includes('ou') ||
                      normalized.includes('ee') ||
                      normalized.includes('oh') ||
                      ['a', 'i', 'u', 'e', 'o'].includes(normalized)
                    ) {
                      mouthTargets.push({ node, index });
                    }
                  });
                }
              }
            });
            normalizeModelToGround(guardianModel);
            root.add(guardianModel);
            captureBasePose(guardianModel);
            if (gltf.animations && gltf.animations.length > 0) {
              mixer = new THREE.AnimationMixer(guardianModel);
              const idleClip = gltf.animations.find((clip) => /idle|wait|stand|loop/i.test(clip.name)) || gltf.animations[0];
              mixer.clipAction(idleClip).reset().play();
            }
            applyPosePreset();
            inspectModel(gltf, guardianModel);
            document.getElementById('model-loading').style.display = 'none';
          },
          undefined,
          (error) => {
            console.error('angel_egna.glb load failed', error);
            logClientError('angel_egna.glb load failed', error, {
              modelUrl: '/live/assets/models/angel_egna.glb'
            });
            document.getElementById('model-loading').textContent = '3Dモデルを読み込めませんでした: ' + (error?.message || 'load failed');
            document.getElementById('guardian-canvas').style.display = 'none';
            document.getElementById('guardian-fallback').style.display = 'grid';
          }
        );

        function animate(time) {
          const delta = clock ? clock.getDelta() : 0.016;
          const t = time * 0.001;
          const thinking = currentStatus === 'thinking';
          const speaking = !audio.paused && !audio.ended;
          const error = currentStatus === 'error' || currentStatus === 'offline';
          const config = poseConfig();
          if (mixer && config.useMixer) mixer.update(delta);
          root.rotation.y = Math.PI + Math.sin(t * 0.65) * 0.12 * config.sway;
          root.position.y = config.y + Math.sin(t * (thinking ? 1.45 : 0.75)) * 0.026 * config.sway;
          if (guardianModel) {
            guardianModel.rotation.z = error ? Math.sin(t * 3.0) * 0.018 : Math.sin(t * 0.7) * 0.01 * config.sway;
          }
          const mouth = speaking ? currentAudioMouthValue() : 0;
          mouthTargets.forEach(({ node, index }) => {
            node.morphTargetInfluences[index] = mouth;
          });
          renderer.render(scene, camera);
          requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
      } catch (e) {
        console.error('3D init failed', e);
        logClientError('3D init failed', e, {
          threeProvider: 'esm.sh',
          modelUrl: '/live/assets/models/angel_egna.glb'
        });
        document.getElementById('guardian-canvas').style.display = 'none';
        document.getElementById('guardian-fallback').style.display = 'grid';
        document.getElementById('model-loading').textContent = '3D表示を初期化できませんでした: ' + (e?.message || 'init failed');
      }
    }

    startGuardian3d();
    loadState();
    loadSettings();
    setInterval(loadState, 1000);
    setInterval(loadSettings, 2000);
  </script>
</body>
</html>
