<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Guardian Live Stage</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b1110;
            color: #f7fbf8;
            font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
        }
        body {
            display: grid;
            place-items: center;
        }
        .frame {
            position: relative;
            width: 100vw;
            height: 100vh;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(8, 13, 12, 0.18), rgba(8, 13, 12, 0.76)),
                #101815;
        }
        @media (min-aspect-ratio: 16/9) {
            .frame {
                width: calc(100vh * 16 / 9);
                height: 100vh;
            }
        }
        @media (max-aspect-ratio: 16/9) {
            .frame {
                width: 100vw;
                height: calc(100vw * 9 / 16);
            }
        }
        .plant-layer {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 22% 24%, rgba(98, 148, 119, 0.22), transparent 34%),
                linear-gradient(135deg, #14201c 0%, #0b1110 100%);
        }
        .plant-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: saturate(1.05) contrast(1.02);
        }
        .plant-placeholder {
            color: #a8bdb2;
            font-size: clamp(26px, 3vw, 52px);
            font-weight: 700;
            letter-spacing: 0;
        }
        .shade {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(4, 8, 7, 0.52), transparent 18%, transparent 58%, rgba(4, 8, 7, 0.72)),
                linear-gradient(90deg, transparent 0%, transparent 52%, rgba(5, 9, 8, 0.72) 100%);
            pointer-events: none;
        }
        .guardian-area {
            position: absolute;
            right: 4.4%;
            top: 13%;
            width: 25%;
            height: 48%;
            display: grid;
            grid-template-rows: 1fr auto auto;
            justify-items: center;
            align-items: end;
        }
        .halo {
            position: absolute;
            top: 1%;
            width: 58%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 225, 133, 0.86), rgba(255, 247, 201, 0.22) 48%, transparent 72%);
            filter: blur(1px);
        }
        .guardian {
            position: relative;
            width: min(100%, 320px);
            aspect-ratio: 0.82;
            border-radius: 8px;
            background:
                linear-gradient(150deg, rgba(255,255,255,0.22), rgba(255,255,255,0.02)),
                linear-gradient(180deg, #f0d489, #c99636);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.46);
            display: grid;
            place-items: center;
            color: #3d2a10;
            font-size: clamp(52px, 6vw, 110px);
            font-weight: 800;
        }
        .guardian::before {
            content: "";
            position: absolute;
            top: 12%;
            width: 48%;
            height: 8%;
            border: 5px solid rgba(255, 251, 220, 0.96);
            border-radius: 50%;
            transform: translateY(-165%);
        }
        .guardian-name {
            margin-top: 18px;
            font-size: clamp(22px, 2.2vw, 38px);
            font-weight: 800;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.55);
        }
        .status {
            margin-top: 7px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(16, 28, 24, 0.74);
            color: #9ee7d0;
            font-size: clamp(13px, 1vw, 18px);
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }
        .user-text {
            position: absolute;
            left: 4.5%;
            top: 5.2%;
            max-width: 48%;
            padding: 12px 18px;
            border-radius: 8px;
            background: rgba(7, 13, 11, 0.66);
            border: 1px solid rgba(178, 225, 202, 0.22);
            color: #dceee5;
            font-size: clamp(18px, 1.45vw, 28px);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .caption {
            position: absolute;
            left: 4.5%;
            right: 4.5%;
            bottom: 5.6%;
            min-height: 17%;
            padding: 24px 32px;
            border-radius: 8px;
            background: rgba(5, 9, 8, 0.86);
            border: 1px solid rgba(181, 231, 207, 0.32);
            box-shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
            display: flex;
            align-items: center;
            color: #fbfff9;
            font-size: clamp(34px, 3.3vw, 62px);
            font-weight: 800;
            line-height: 1.35;
            letter-spacing: 0;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.62);
        }
        .error {
            color: #ffb5b5;
        }
    </style>
</head>
<body>
    <main class="frame">
        <section class="plant-layer">
            <img id="plant-image" class="plant-image" alt="植物画像" style="display:none;">
            <div id="plant-placeholder" class="plant-placeholder">植物画像を待っています</div>
        </section>
        <div class="shade"></div>
        <aside class="guardian-area">
            <div class="halo"></div>
            <div class="guardian">天</div>
            <div class="guardian-name">守護天使</div>
            <div id="status" class="status">idle</div>
        </aside>
        <div id="user-text" class="user-text">スマホからのメッセージ待ち</div>
        <div id="caption" class="caption">スマホから話しかけると、ここに守護天使の返答が表示されます。</div>
    </main>
    <script>
        let lastUpdatedAt = null;

        function textOrFallback(value, fallback) {
            return value && String(value).trim() ? String(value) : fallback;
        }

        function render(state) {
            if (!state || state.updatedAt === lastUpdatedAt) return;
            lastUpdatedAt = state.updatedAt;

            const image = document.getElementById('plant-image');
            const placeholder = document.getElementById('plant-placeholder');
            if (state.plantImageDataUrl) {
                image.src = state.plantImageDataUrl;
                image.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                image.removeAttribute('src');
                image.style.display = 'none';
                placeholder.style.display = 'block';
            }

            document.getElementById('status').textContent = textOrFallback(state.status, 'idle');
            document.getElementById('user-text').textContent = textOrFallback(state.userText, 'スマホからのメッセージ待ち');

            const caption = document.getElementById('caption');
            if (state.error) {
                caption.classList.add('error');
                caption.textContent = 'エラー: ' + state.error;
            } else {
                caption.classList.remove('error');
                caption.textContent = textOrFallback(
                    state.assistantText,
                    state.status === 'thinking' ? '守護天使が考えています。' : 'スマホから話しかけると、ここに守護天使の返答が表示されます。'
                );
            }
        }

        function loadState() {
            fetch('/api/live/state', { cache: 'no-store' })
                .then(r => r.json())
                .then(render)
                .catch(() => {
                    document.getElementById('status').textContent = 'offline';
                });
        }

        loadState();
        setInterval(loadState, 1000);
    </script>
</body>
</html>
