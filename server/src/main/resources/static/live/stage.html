<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Guardian Live Stage</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1110;
      color: #f7fbf8;
      font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    }
    body { display: grid; place-items: center; }
    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: linear-gradient(135deg, #14201c 0%, #0b1110 100%);
    }
    @media (min-aspect-ratio: 16/9) {
      .frame { width: calc(100vh * 16 / 9); height: 100vh; }
    }
    @media (max-aspect-ratio: 16/9) {
      .frame { width: 100vw; height: calc(100vw * 9 / 16); }
    }
    .plant-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 22% 24%, rgba(98, 148, 119, 0.22), transparent 34%),
        linear-gradient(135deg, #14201c 0%, #0b1110 100%);
    }
    .plant-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: saturate(1.05) contrast(1.02);
    }
    .plant-placeholder {
      color: #a8bdb2;
      font-size: clamp(26px, 3vw, 52px);
      font-weight: 700;
    }
    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(4, 8, 7, 0.52), transparent 18%, transparent 58%, rgba(4, 8, 7, 0.72)),
        linear-gradient(90deg, transparent 0%, transparent 52%, rgba(5, 9, 8, 0.74) 100%);
      pointer-events: none;
    }
    .guardian-area {
      position: absolute;
      right: 4.4%;
      top: 7%;
      width: 27%;
      height: 61%;
      display: grid;
      grid-template-rows: 1fr auto auto;
      justify-items: center;
      align-items: end;
    }
    #guardian-canvas {
      width: min(100%, 390px);
      height: min(100%, 510px);
      min-height: 360px;
      display: block;
    }
    .guardian-fallback {
      display: none;
      width: min(100%, 320px);
      aspect-ratio: 0.82;
      border-radius: 8px;
      background: linear-gradient(180deg, #f0d489, #c99636);
      place-items: center;
      color: #3d2a10;
      font-size: clamp(52px, 6vw, 110px);
      font-weight: 800;
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.46);
    }
    .guardian-name {
      margin-top: 2px;
      font-size: clamp(22px, 2.2vw, 38px);
      font-weight: 800;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.55);
    }
    .status {
      margin-top: 7px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(16, 28, 24, 0.74);
      color: #9ee7d0;
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 700;
      text-transform: uppercase;
    }
    .loading {
      position: absolute;
      right: 5%;
      top: 68%;
      color: #e9f4ee;
      font-size: clamp(12px, 1vw, 16px);
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    .audio-button {
      position: absolute;
      right: 4.5%;
      top: 4.2%;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 8px;
      background: rgba(9, 16, 14, 0.72);
      color: #f7fbf8;
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 700;
      cursor: pointer;
    }
    .audio-button.enabled {
      color: #112018;
      background: #9ee7d0;
    }
    .user-text {
      position: absolute;
      left: 4.5%;
      top: 5.2%;
      max-width: 48%;
      padding: 12px 18px;
      border-radius: 8px;
      background: rgba(7, 13, 11, 0.66);
      border: 1px solid rgba(178, 225, 202, 0.22);
      color: #dceee5;
      font-size: clamp(18px, 1.45vw, 28px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .caption {
      position: absolute;
      left: 4.5%;
      right: 4.5%;
      bottom: 5.2%;
      height: 24%;
      padding: 22px 30px;
      border-radius: 8px;
      background: rgba(5, 9, 8, 0.86);
      border: 1px solid rgba(181, 231, 207, 0.32);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
      display: flex;
      align-items: center;
      color: #fbfff9;
      font-size: clamp(28px, 2.35vw, 46px);
      font-weight: 800;
      line-height: 1.32;
      overflow: hidden;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.62);
    }
    .error { color: #ffb5b5; }
  </style>
</head>
<body>
  <main class="frame">
    <section class="plant-layer">
      <img id="plant-image" class="plant-image" alt="植物画像" style="display:none;">
      <div id="plant-placeholder" class="plant-placeholder">植物画像を待っています</div>
    </section>
    <div class="shade"></div>
    <button id="audio-toggle" class="audio-button" type="button">Enable Audio</button>
    <aside class="guardian-area">
      <canvas id="guardian-canvas"></canvas>
      <div id="guardian-fallback" class="guardian-fallback">天</div>
      <div class="guardian-name">守護天使</div>
      <div id="status" class="status">idle</div>
    </aside>
    <div id="model-loading" class="loading">angel_egna.glb loading...</div>
    <div id="user-text" class="user-text">スマホまたはPCからのメッセージ待ち</div>
    <div id="caption" class="caption">話しかけると、ここに守護天使の返答が表示されます。</div>
    <audio id="live-audio" preload="auto"></audio>
  </main>
  <script type="module">
    let lastUpdatedAt = null;
    let lastAudioUrl = null;
    let audioEnabled = false;
    let currentStatus = 'idle';
    let guardianModel = null;
    let mouthTargets = [];

    const audio = document.getElementById('live-audio');
    const audioToggle = document.getElementById('audio-toggle');
    audioToggle.addEventListener('click', () => {
      audioEnabled = true;
      audioToggle.classList.add('enabled');
      audioToggle.textContent = 'Audio Enabled';
      audio.play().catch(() => {});
    });

    function textOrFallback(value, fallback) {
      return value && String(value).trim() ? String(value) : fallback;
    }

    function playAudio(url) {
      if (!audioEnabled || !url || url === lastAudioUrl) return;
      lastAudioUrl = url;
      audio.src = url + '?t=' + Date.now();
      audio.play().catch(() => {});
    }

    function render(state) {
      if (!state || state.updatedAt === lastUpdatedAt) return;
      lastUpdatedAt = state.updatedAt;
      currentStatus = textOrFallback(state.status, 'idle');

      const image = document.getElementById('plant-image');
      const placeholder = document.getElementById('plant-placeholder');
      if (state.plantImageDataUrl) {
        image.src = state.plantImageDataUrl;
        image.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        image.removeAttribute('src');
        image.style.display = 'none';
        placeholder.style.display = 'block';
      }

      document.getElementById('status').textContent = currentStatus;
      document.getElementById('user-text').textContent = textOrFallback(state.userText, 'スマホまたはPCからのメッセージ待ち');

      const caption = document.getElementById('caption');
      if (state.error) {
        caption.classList.add('error');
        caption.textContent = 'エラー: ' + state.error;
      } else {
        caption.classList.remove('error');
        caption.textContent = textOrFallback(
          state.assistantText,
          currentStatus === 'thinking' ? '守護天使が考えています。' : '話しかけると、ここに守護天使の返答が表示されます。'
        );
      }
      playAudio(state.audioUrl);
    }

    function loadState() {
      fetch('/api/live/state', { cache: 'no-store' })
        .then(r => r.json())
        .then(render)
        .catch(() => {
          currentStatus = 'offline';
          document.getElementById('status').textContent = 'offline';
        });
    }

    async function startGuardian3d() {
      try {
        const THREE = await import('https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js');
        const { GLTFLoader } = await import('https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/loaders/GLTFLoader.js');
        const canvas = document.getElementById('guardian-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
        camera.position.set(0, 1.15, 3.5);

        const key = new THREE.DirectionalLight(0xfff1ba, 2.7);
        key.position.set(2.2, 3.2, 4.5);
        scene.add(key);
        scene.add(new THREE.AmbientLight(0xd8f4e6, 1.55));

        const root = new THREE.Group();
        root.position.set(0, -0.95, 0);
        root.rotation.y = Math.PI;
        scene.add(root);

        function resize() {
          const rect = canvas.getBoundingClientRect();
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.setSize(rect.width, rect.height, false);
          camera.aspect = rect.width / rect.height;
          camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        const loader = new GLTFLoader();
        loader.load(
          '/live/assets/models/angel_egna.glb',
          (gltf) => {
            guardianModel = gltf.scene;
            guardianModel.scale.setScalar(1.38);
            guardianModel.position.set(0, 0, 0);
            root.add(guardianModel);
            mouthTargets = [];
            guardianModel.traverse((node) => {
              if (node.isMesh) {
                node.frustumCulled = false;
                if (node.morphTargetDictionary && node.morphTargetInfluences) {
                  Object.entries(node.morphTargetDictionary).forEach(([name, index]) => {
                    const normalized = name.toLowerCase();
                    if (normalized.includes('mth') || ['a', 'i', 'u', 'e', 'o'].includes(normalized)) {
                      mouthTargets.push({ node, index });
                    }
                  });
                }
              }
            });
            document.getElementById('model-loading').style.display = 'none';
          },
          undefined,
          () => {
            document.getElementById('model-loading').textContent = '3Dモデルを読み込めませんでした';
            document.getElementById('guardian-canvas').style.display = 'none';
            document.getElementById('guardian-fallback').style.display = 'grid';
          }
        );

        function animate(time) {
          const t = time * 0.001;
          const thinking = currentStatus === 'thinking';
          const speaking = !audio.paused && !audio.ended;
          const error = currentStatus === 'error' || currentStatus === 'offline';
          root.rotation.y = Math.PI + Math.sin(t * 0.65) * 0.12;
          root.position.y = -0.95 + Math.sin(t * (thinking ? 2.0 : 1.0)) * 0.045;
          if (guardianModel) {
            guardianModel.rotation.z = error ? Math.sin(t * 4.0) * 0.025 : Math.sin(t * 0.9) * 0.018;
          }
          const mouth = speaking ? (Math.sin(t * 18) + 1) * 0.45 : 0;
          mouthTargets.forEach(({ node, index }) => {
            node.morphTargetInfluences[index] = mouth;
          });
          renderer.render(scene, camera);
          requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
      } catch (e) {
        document.getElementById('guardian-canvas').style.display = 'none';
        document.getElementById('guardian-fallback').style.display = 'grid';
        document.getElementById('model-loading').textContent = '3D表示を初期化できませんでした';
      }
    }

    startGuardian3d();
    loadState();
    setInterval(loadState, 1000);
  </script>
</body>
</html>
