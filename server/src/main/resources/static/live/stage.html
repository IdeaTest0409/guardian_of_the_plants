<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Guardian Live Stage</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #101614;
            color: #f7fbf8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 34vw;
            gap: 0;
            background:
                linear-gradient(90deg, rgba(16, 22, 20, 0.18), rgba(16, 22, 20, 0.72)),
                #101614;
        }
        .plant-panel {
            position: relative;
            min-width: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #17211d;
        }
        .plant-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .plant-placeholder {
            color: #9fb3a9;
            font-size: clamp(22px, 3vw, 42px);
            letter-spacing: 0;
        }
        .guardian-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4vh 3vw 20vh;
            background: linear-gradient(180deg, rgba(31, 43, 38, 0.9), rgba(11, 15, 14, 0.96));
        }
        .halo {
            width: min(22vw, 280px);
            height: min(22vw, 280px);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(248, 224, 137, 0.9), rgba(250, 244, 210, 0.16) 48%, rgba(250, 244, 210, 0) 70%);
            filter: blur(2px);
            position: absolute;
            top: 14vh;
        }
        .guardian {
            position: relative;
            width: min(24vw, 320px);
            aspect-ratio: 1;
            border-radius: 28px;
            background:
                linear-gradient(150deg, rgba(255,255,255,0.22), rgba(255,255,255,0.04)),
                linear-gradient(180deg, #f4d990, #c99b3c);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3c2c10;
            font-size: clamp(40px, 6vw, 84px);
            font-weight: 700;
        }
        .guardian::before {
            content: "";
            position: absolute;
            top: 14%;
            width: 46%;
            height: 9%;
            border: 5px solid rgba(255, 251, 220, 0.94);
            border-radius: 50%;
            transform: translateY(-155%);
        }
        .name {
            margin-top: 18px;
            font-size: clamp(22px, 2.8vw, 38px);
            font-weight: 700;
        }
        .status {
            margin-top: 8px;
            color: #9ee7d0;
            font-size: clamp(13px, 1.3vw, 18px);
            text-transform: uppercase;
        }
        .caption {
            position: absolute;
            left: 4vw;
            right: 4vw;
            bottom: 5vh;
            min-height: 120px;
            padding: 24px 30px;
            border-radius: 18px;
            background: rgba(8, 13, 11, 0.82);
            border: 1px solid rgba(173, 231, 204, 0.28);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
            font-size: clamp(26px, 3.2vw, 52px);
            font-weight: 700;
            line-height: 1.45;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.48);
        }
        .user-text {
            position: absolute;
            left: 4vw;
            top: 4vh;
            max-width: 58vw;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #d7e8df;
            font-size: clamp(14px, 1.4vw, 20px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 800px) {
            .stage { grid-template-columns: 1fr; }
            .guardian-panel {
                position: absolute;
                right: 3vw;
                bottom: 20vh;
                width: 28vw;
                min-width: 132px;
                height: auto;
                padding: 0;
                background: transparent;
            }
            .halo { display: none; }
            .guardian { width: 100%; border-radius: 18px; }
            .name, .status { display: none; }
            .caption { min-height: 92px; font-size: clamp(22px, 5vw, 36px); }
        }
    </style>
</head>
<body>
    <main class="stage">
        <section class="plant-panel">
            <img id="plant-image" class="plant-image" alt="最新の植物画像" style="display:none;">
            <div id="plant-placeholder" class="plant-placeholder">植物画像を待っています</div>
        </section>
        <aside class="guardian-panel">
            <div class="halo"></div>
            <div class="guardian">天</div>
            <div class="name">守護天使</div>
            <div id="status" class="status">idle</div>
        </aside>
        <div id="user-text" class="user-text">スマホからのメッセージ待ち</div>
        <div id="caption" class="caption">スマホから話しかけると、ここに守護天使の返答が表示されます。</div>
    </main>
    <script>
        let lastUpdatedAt = null;

        function textOrFallback(value, fallback) {
            return value && String(value).trim() ? String(value) : fallback;
        }

        function render(state) {
            if (!state || state.updatedAt === lastUpdatedAt) return;
            lastUpdatedAt = state.updatedAt;

            const image = document.getElementById('plant-image');
            const placeholder = document.getElementById('plant-placeholder');
            if (state.plantImageDataUrl) {
                image.src = state.plantImageDataUrl;
                image.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                image.removeAttribute('src');
                image.style.display = 'none';
                placeholder.style.display = 'block';
            }

            document.getElementById('status').textContent = textOrFallback(state.status, 'idle');
            document.getElementById('user-text').textContent = textOrFallback(state.userText, 'スマホからのメッセージ待ち');
            document.getElementById('caption').textContent = state.error
                ? 'エラー: ' + state.error
                : textOrFallback(state.assistantText, 'スマホから話しかけると、ここに守護天使の返答が表示されます。');
        }

        function loadState() {
            fetch('/api/live/state', { cache: 'no-store' })
                .then(r => r.json())
                .then(render)
                .catch(() => {
                    document.getElementById('status').textContent = 'offline';
                });
        }

        loadState();
        setInterval(loadState, 1000);
    </script>
</body>
</html>
