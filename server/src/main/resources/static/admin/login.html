<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Plants - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 12px; padding: 36px 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 24px; }
        label { display: block; font-weight: 700; margin-bottom: 4px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font: inherit; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #4a90d9; }
        .btn { width: 100%; background: #4a90d9; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 700; }
        .btn:hover { background: #357abd; }
        .error { background: #fef2f2; color: #991b1b; padding: 10px; border-radius: 6px; margin-bottom: 16px; text-align: center; font-size: 0.9rem; display: none; }
        .note { text-align: center; font-size: 0.75rem; color: #888; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Guardian Plants</h1>
        <div class="error" id="error-msg">ユーザー名またはパスワードが間違っています</div>
        <form method="post" action="/admin/login">
            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button class="btn" type="submit">ログイン</button>
        </form>
        <div class="note">管理画面にアクセスするにはログインが必要です</div>
    </div>
    <script>
        if (new URLSearchParams(location.search).has('error')) {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
