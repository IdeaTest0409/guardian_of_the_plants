<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Plants - Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 24px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 4px; }
        .version-bar { text-align: center; font-size: 0.75rem; color: #666; margin-bottom: 24px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; width: 100%; max-width: 960px; }
        .card { background: #fff; border-radius: 12px; padding: 28px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card-icon { font-size: 2.4rem; margin-bottom: 12px; }
        .card h2 { font-size: 1.15rem; margin-bottom: 8px; }
        .card p { font-size: 0.85rem; color: #666; line-height: 1.6; margin-bottom: 20px; }
        .card-btn { background: #4a90d9; color: #fff; border: none; padding: 10px 28px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: none; display: inline-block; }
        .card-btn:hover { background: #357abd; }
        .footer { margin-top: auto; padding-top: 32px; font-size: 0.75rem; color: #888; text-align: center; }
        @media (max-width: 600px) {
            body { padding: 16px; }
            .card { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <h1>Guardian Plants</h1>
    <div class="version-bar" id="version-bar">Version: loading...</div>

    <div class="dashboard">
        <div class="card">
            <div class="card-icon">📋</div>
            <h2>Log Viewer</h2>
            <p>アプリログ・チャット履歴・<br>リクエストフローの表示、<br>ダウンロード、削除</p>
            <a class="card-btn" href="/admin/logs.html">開く</a>
        </div>

        <div class="card">
            <div class="card-icon">🤖</div>
            <h2>AI Settings</h2>
            <p>AIプロファイルの管理、<br>接続テスト、<br>アクティブモデルの切り替え</p>
            <a class="card-btn" href="/admin/ai.html">開く</a>
        </div>

        <div class="card">
            <div class="card-icon">🎛️</div>
            <h2>Live Control</h2>
            <p>ライブ配信の操作、<br>自動トーク管理、BGM設定、<br>ステージプレビュー</p>
            <a class="card-btn" href="/admin/live.html">開く</a>
        </div>
    </div>

    <div class="footer">
        <span id="version">Version: loading...</span>
    </div>

    <script>
        (function() {
            const verEls = document.querySelectorAll('#version-bar, #version');
            function setVersion(text) { verEls.forEach(el => el.textContent = text); }
            fetch('/api/health')
                .then(r => r.json())
                .then(d => {
                    const v = d.version || 'unknown';
                    const env = d.appEnv || '';
                    setVersion('Version: ' + v + (env ? ' (' + env + ')' : ''));
                })
                .catch(() => setVersion('Version: unavailable'));
        })();
    </script>
</body>
</html>
