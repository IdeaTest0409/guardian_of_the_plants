<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Plants - Live Control</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f4f6f5;
      color: #242927;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Meiryo", sans-serif;
    }
    header {
      padding: 18px 24px;
      background: #21342d;
      color: #fff;
    }
    h1 { margin: 0; font-size: 22px; }
    main {
      display: grid;
      grid-template-columns: minmax(340px, 470px) 1fr;
      gap: 16px;
      padding: 16px;
    }
    section {
      background: #fff;
      border: 1px solid #dbe2df;
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid #cbd6d1;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }
    textarea {
      min-height: 116px;
      resize: vertical;
    }
    button, a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border: 0;
      border-radius: 6px;
      background: #2f7d57;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    button.secondary, a.secondary { background: #48635a; }
    button.warn { background: #a65d2f; }
    button.listening { background: #b83838; }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .quick-grid button {
      min-height: 36px;
      padding: 7px 10px;
      background: #edf4f1;
      color: #24352f;
      border: 1px solid #c9d8d2;
      font-weight: 700;
    }
    .status {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #e6f6ee;
      color: #14633b;
      font-weight: 700;
    }
    .state-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 12px;
      font-size: 14px;
      margin-top: 12px;
    }
    .state-grid dt { font-weight: 700; color: #51615b; }
    .state-grid dd { margin: 0; overflow-wrap: anywhere; }
    .preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid #dbe2df;
      border-radius: 8px;
      background: #111;
    }
    .log {
      margin-top: 12px;
      padding: 10px;
      min-height: 42px;
      background: #f0f3f2;
      border-radius: 6px;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .hint {
      color: #66746f;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
    }
    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Guardian Plants - Live Control</h1>
  </header>
  <main>
    <section>
      <h2>PC Chat</h2>
      <label for="message">Message</label>
      <textarea id="message" maxlength="300" placeholder="PCから守護天使に話しかける"></textarea>

      <label>Quick Choices</label>
      <div id="quick-grid" class="quick-grid"></div>

      <div class="row">
        <button id="send">Send</button>
        <button id="voice" class="secondary">Voice Input</button>
        <button id="clear" class="warn">Clear</button>
      </div>
      <div class="hint">
        音声入力はChrome/Edge系ブラウザで動作します。HTTP環境ではブラウザ設定によりマイク許可が制限される場合があります。
      </div>

      <div class="row">
        <button id="refresh" class="secondary">Refresh</button>
        <a class="button secondary" href="/live/stage.html" target="_blank" rel="noopener">Open Stage</a>
      </div>
      <div id="log" class="log"></div>
    </section>

    <section>
      <h2>Current State <span id="status" class="status">loading</span></h2>
      <iframe class="preview" src="/live/stage.html" title="Live stage preview"></iframe>
      <dl class="state-grid">
        <dt>Updated</dt><dd id="updatedAt"></dd>
        <dt>User</dt><dd id="userText"></dd>
        <dt>Assistant</dt><dd id="assistantText"></dd>
        <dt>Audio</dt><dd id="audioUrl"></dd>
        <dt>Error</dt><dd id="error"></dd>
      </dl>
    </section>
  </main>

  <script>
    const quickChoices = [
      'こんにちは',
      '今の季節大丈夫？',
      '葉の色は大丈夫？',
      '水は足りてる？',
      '置き場所はこのままでいい？',
      '元気に育ってる？',
      '今日の一言をお願い',
      '配信用に短く話して'
    ];

    const log = document.getElementById('log');
    const message = document.getElementById('message');
    const voiceButton = document.getElementById('voice');
    let recognition = null;
    let listening = false;

    function setLog(text) {
      log.textContent = text || '';
    }

    function render(state) {
      document.getElementById('status').textContent = state.status || 'idle';
      document.getElementById('updatedAt').textContent = state.updatedAt || '';
      document.getElementById('userText').textContent = state.userText || '';
      document.getElementById('assistantText').textContent = state.assistantText || '';
      document.getElementById('audioUrl').textContent = state.audioUrl || '';
      document.getElementById('error').textContent = state.error || '';
    }

    function setupQuickChoices() {
      const grid = document.getElementById('quick-grid');
      quickChoices.forEach((text) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = text;
        button.addEventListener('click', () => {
          message.value = text;
          message.focus();
        });
        grid.appendChild(button);
      });
    }

    async function refresh() {
      const res = await fetch('/api/live/state', { cache: 'no-store' });
      render(await res.json());
    }

    async function send() {
      const text = message.value.trim();
      if (!text) return;
      setLog('sending...');
      const body = {
        deviceId: 'admin-live',
        conversationId: 'admin-live',
        messages: [
          { role: 'user', content: text }
        ],
        options: { temperature: 0.7, maxTokens: 180 }
      };
      const res = await fetch('/api/live/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const payload = await res.json();
      setLog(JSON.stringify(payload, null, 2));
      if (payload.state) render(payload.state);
      await refresh();
    }

    function setupVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        voiceButton.disabled = true;
        voiceButton.textContent = 'Voice unavailable';
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.onstart = () => {
        listening = true;
        voiceButton.classList.add('listening');
        voiceButton.textContent = 'Listening...';
      };
      recognition.onend = () => {
        listening = false;
        voiceButton.classList.remove('listening');
        voiceButton.textContent = 'Voice Input';
      };
      recognition.onerror = (event) => {
        setLog('voice error: ' + event.error);
      };
      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        message.value = transcript.trim();
      };
    }

    voiceButton.addEventListener('click', () => {
      if (!recognition) return;
      if (listening) {
        recognition.stop();
      } else {
        recognition.start();
      }
    });
    document.getElementById('send').addEventListener('click', () => send().catch(e => setLog(String(e))));
    document.getElementById('refresh').addEventListener('click', () => refresh().catch(e => setLog(String(e))));
    document.getElementById('clear').addEventListener('click', () => {
      message.value = '';
      message.focus();
    });

    setupQuickChoices();
    setupVoiceInput();
    refresh().catch(e => setLog(String(e)));
    setInterval(() => refresh().catch(() => {}), 5000);
  </script>
</body>
</html>
